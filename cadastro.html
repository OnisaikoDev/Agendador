<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>login</title>
</head>
<body>
    <h1>Bem vinda!</h1>
    <p>Crie sua conta para agendar seus horários.</p>

    <form action="#" method="post">
        <fieldset>
           <div>
            <label for="nome">Cadastro:</label>
            <input type="text" placeholder="Nome" required name="name">
            <input type="text" placeholder="Sobrenome" required name="lastname">
            <input type="email" placeholder="Email" required name="email">
            <input type="number" placeholder="Telefone" required name="phone">
            <input type="text" placeholder="Usuário" required name="username">
            <input type="password" placeholder="Senha" required name="password">
            <input type="password" placeholder="Confirmar senha" required name="confirm_password">
            <input type="submit" value="Cadastrar" class="btn">
           </div>
           <div>
             <div class="divider">
                <span></span>
            </div>
            <p class="register-text">
                    Já tem uma conta? <a href="index.html">Faça login</a>
            </p>
           </div>
        </fieldset>
    </form>
    
</body>
</html>
