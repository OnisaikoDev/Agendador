<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.11/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.11/index.global.min.js"></script>
    <title>Dashboard | Agenda da Manicure</title>
</head>
<body class="dashboard-page">
    <div class="dashboard-shell">
        <header class="dashboard-header">
            <div class="header-logo">
                <img src="img/WhatsApp Image 2026-03-25 at 12.46.54.jpeg" alt="Logo">
            </div>

            <nav class="header-menu" aria-label="Menu principal">
                <ul class="menu">
                    <li class="active">Dashboard</li>
                    <li id="open-booking-panel">Agendamento</li>
                    <li id="open-client-panel">Clientes</li>
                    <li id="open-settings-panel">Configuracoes</li>
                </ul>
            </nav>

            <button class="logout" type="button">Sair</button>
        </header>

        <main class="dashboard-container">
            <section class="dashboard-card">
                <div class="calendar-panel">
                    <!-- cabecalho do calendario com as setinhas e a data -->
                    <div class="calendar-topbar">
                        <div class="calendar-nav">
                            <button type="button" class="calendar-arrow" id="calendar-prev">&#8249;</button>
                            <button type="button" class="calendar-arrow" id="calendar-next">&#8250;</button>
                        </div>
                        <h2 id="calendar-title">25 de marco de 2026</h2>
                    </div>

                    <div class="calendar-section">
                        <!-- aqui fica o calendario principal -->
                        <div id="calendar"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <aside class="booking-drawer" id="booking-drawer" aria-hidden="true">
        <div class="booking-drawer-card">
            <div class="drawer-header">
                <h2>Novo agendamento</h2>
                <button type="button" class="drawer-close" id="close-booking-panel">&times;</button>
            </div>

            <!-- formulario para criar um novo horario -->
            <form id="agendamento">
                <input type="text" id="nome" name="nome" placeholder="Nome" list="client-suggestions" required>
                <datalist id="client-suggestions"></datalist>
                <input type="tel" id="telefone" name="telefone" placeholder="Telefone" required>
                <select id="profissional" name="profissional" required>
                    <option value="1">Maria</option>
                    <option value="2">Ana</option>
                    <option value="3">Joana</option>
                    <option value="4">Carla</option>
                </select>
                <input type="hidden" id="servico" name="servico" value="Manicure">
                <input type="date" id="data" name="data" required>
                <input type="time" id="horario" name="horario" required>
                <button type="submit" class="btn">Agendar</button>
            </form>
        </div>
    </aside>

    <aside class="booking-drawer client-drawer" id="client-drawer" aria-hidden="true">
        <div class="booking-drawer-card">
            <div class="drawer-header">
                <h2>Novo cliente</h2>
                <button type="button" class="drawer-close" id="close-client-panel">&times;</button>
            </div>

            <!-- formulario para cadastrar cliente -->
            <form id="client-form">
                <input type="text" id="client-name" name="name" placeholder="Nome" required>
                <input type="tel" id="client-phone" name="phone" placeholder="Telefone" required>
                <input type="email" id="client-email" name="email" placeholder="Email" required>
                <input type="text" id="client-note" name="note" placeholder="Observacao">
                <button type="submit" class="btn">Cadastrar cliente</button>
            </form>
        </div>
    </aside>

    <aside class="booking-drawer settings-drawer" id="settings-drawer" aria-hidden="true">
        <div class="booking-drawer-card settings-card">
            <div class="drawer-header">
                <h2>Configuracoes</h2>
                <button type="button" class="drawer-close" id="close-settings-panel">&times;</button>
            </div>

            <!-- botoes das abas de configuracao -->
            <div class="settings-menu">
                <button type="button" class="settings-tab active" data-settings-tab="cancelamentos">Cancelamento</button>
                <button type="button" class="settings-tab" data-settings-tab="funcionarios">Funcionarios</button>
                <button type="button" class="settings-tab" data-settings-tab="servicos">Servicos</button>
                <button type="button" class="settings-tab" data-settings-tab="financeiro">Financeiro</button>
            </div>

            <!-- area para cancelar horarios ja criados -->
            <section class="settings-panel active" data-settings-panel="cancelamentos">
                <h3>Cancelar agendamentos</h3>
                <div id="scheduled-list" class="settings-list"></div>
            </section>

            <!-- area para adicionar ou remover funcionarias -->
            <section class="settings-panel" data-settings-panel="funcionarios">
                <h3>Gerenciar funcionarios</h3>
                <form id="employee-form" class="settings-form">
                    <input type="text" id="employee-name" name="name" placeholder="Nome da funcionaria" required>
                    <button type="submit" class="btn">Adicionar funcionaria</button>
                </form>
                <div id="employee-list" class="settings-list"></div>
            </section>

            <!-- area para adicionar ou remover servicos -->
            <section class="settings-panel" data-settings-panel="servicos">
                <h3>Gerenciar servicos</h3>
                <form id="service-form" class="settings-form">
                    <input type="text" id="service-name" name="name" placeholder="Nome do servico" required>
                    <button type="submit" class="btn">Adicionar servico</button>
                </form>
                <div id="service-list" class="settings-list"></div>
            </section>

            <!-- area financeira com os boletos do sistema -->
            <section class="settings-panel" data-settings-panel="financeiro">
                <h3>Boletos do sistema</h3>
                <div id="finance-list" class="settings-list"></div>
            </section>
        </div>
    </aside>

    <div class="drawer-backdrop" id="drawer-backdrop" hidden></div>

    <script src="js/script.js"></script>
</body>
</html>
