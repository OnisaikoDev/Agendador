<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Login | Agenda da Manicure</title>
</head>
<body>
    <main class="auth-page">
        <section class="hero-copy">
            <h1>Bem-vinda!</h1>
            <p>Acesse sua conta para agendar seus horarios com rapidez.</p>
        </section>

        <form class="card auth-form" id="login-form" action="#" method="post">
            <fieldset>
                <legend>Entrar na conta</legend>

                <div class="input-group">
                    <img src="img/perfil.png" class="icon" alt="">
                    <input id="username" type="text" placeholder="Digite seu usuario" required name="username" autocomplete="username">
                </div>

                <div class="input-group">
                    <img src="img/cadeado.png" class="icon" alt="">
                    <input id="password" type="password" placeholder="Digite sua senha" required name="password" autocomplete="current-password">
                </div>

                <div class="rem">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Lembrar-me</label>
                    </div>
                    <a href="senha.html" class="forgot-password">Esqueceu sua senha?</a>
                </div>

                <div class="action">
                    <button type="submit" class="btn">Entrar</button>
                </div>

                <div class="divider" aria-hidden="true">
                    <span></span>
                </div>

                <p class="register-text">
                    Nao tem uma conta? <a href="cadastro.html">Cadastre-se</a>
                </p>
            </fieldset>
        </form>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
