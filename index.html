<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>login</title>
</head>
<body>
    <h1>Bem vinda!</h1>
    <p>Acesse sua conta para agendar seus horários.</p>

    <form action="#" method="post">
        <fieldset>
           <div class="input-group">
                <img src="img/perfil.png" class="icon">
                <input type="text" placeholder="Usuário" required name="username">
            </div>
            <div class="input-group2">
                <img src="img/cadeado.png" class="icon">
                <input type="password" placeholder="Senha" required name="password">
            </div>
            <div class="rem">
                <input type="checkbox" id="remember">
                <label for="remember">Lembrar-me</label>
                <a href="senha.html" class="forgot-password">Esqueceu sua senha?</a>
            </div>

            <div class="action">
                <input type="submit" value="Entrar" class="btn">
            </div>
            <div class="divider">
                <span></span>
            </div>
            <div>
                <p class="register-text">
                        Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
                </p>
            </div>
        </fieldset>
    </form>
    
</body>
</html>
