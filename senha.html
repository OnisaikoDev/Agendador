<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Recuperar Senha | Agenda da Manicure</title>
</head>
<body>
    <main class="auth-page">
        <section class="hero-copy">
            <h1>Recuperar senha</h1>
            <p>Informe seu email para receber as instrucoes de acesso.</p>
        </section>

        <form class="card auth-form" id="recovery-form" action="#" method="post">
            <fieldset>
                <legend>Recuperacao de senha</legend>

                <div id="cadastro">
                    <input id="recovery-email" type="email" placeholder="voce@email.com" required name="email" autocomplete="email">
                </div>

                <div class="action">
                    <button type="submit" class="btn">Recuperar senha</button>
                </div>

                <div class="divider" aria-hidden="true">
                    <span></span>
                </div>

                <p class="register-text">
                    Ja tem uma conta? <a href="index.html">Faca login</a>
                </p>
            </fieldset>
        </form>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
